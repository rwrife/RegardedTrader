name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + lint + test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all workspaces
        run: npm run build

      - name: Lint all workspaces
        run: npm run lint

      - name: Run tests
        run: npm test

  no-any-guard:
    name: guard against new ": any" / "as any"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine diff range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            # push to main: compare against previous commit
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
              # first push or unknown base — skip guard
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "head=$head" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Scan added lines for ": any" / "as any" (AGENTS.md rule #10)
        if: steps.range.outputs.skip != 'true'
        run: |
          set -euo pipefail
          base='${{ steps.range.outputs.base }}'
          head='${{ steps.range.outputs.head }}'

          # Diff only added lines in .ts/.tsx files, excluding tests and type declarations.
          added=$(git diff --unified=0 --no-color "$base" "$head" -- \
              '*.ts' '*.tsx' \
              ':(exclude)*.test.ts' ':(exclude)*.test.tsx' \
              ':(exclude)*.d.ts' \
              ':(exclude)**/__fixtures__/**' \
            | grep -E '^\+' \
            | grep -Ev '^\+\+\+' \
            || true)

          # Match `: any` or `as any` — allow lines that carry a justification comment.
          offenders=$(echo "$added" \
            | grep -E ':[[:space:]]*any([^A-Za-z0-9_]|$)|as[[:space:]]+any([^A-Za-z0-9_]|$)' \
            | grep -Ev '(eslint-disable|@ts-expect-error|any-ok|// *justif)' \
            || true)

          if [ -n "$offenders" ]; then
            echo "::error::New ': any' or 'as any' usages detected. AGENTS.md rule #10 forbids these in new code unless justified with a comment (add 'any-ok' or an eslint-disable justification)."
            echo "$offenders"
            exit 1
          fi
          echo "no new untyped any usages — ok"
